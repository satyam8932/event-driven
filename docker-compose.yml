x-app-base: &app-base
  build: .
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
    migrate:
      condition: service_completed_successfully

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/pipeline &&
        mc anonymous set download local/pipeline/public/ || true &&
        echo 'MinIO bucket ready'
      "
    restart: "no"

  # ── Migration (one-shot) ────────────────────────────────────────────────────

  migrate:
    <<: *app-base
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    # override app-base depends_on — only needs postgres
    restart: "no"

  # ── Application Services ────────────────────────────────────────────────────

  api:
    <<: *app-base
    command: ["app.api.main"]
    ports:
      - "8000:8000"
    restart: unless-stopped
    stop_grace_period: 30s

  worker:
    <<: *app-base
    command: ["app.workers.__main__"]
    environment:
      WORKER_STAGES: "parse,tts,stitch,notify"
    restart: unless-stopped
    stop_grace_period: 30s

  relay:
    <<: *app-base
    command: ["app.relay.__main__"]
    restart: unless-stopped
    stop_grace_period: 30s

  janitor:
    <<: *app-base
    command: ["app.janitor.__main__"]
    restart: unless-stopped
    stop_grace_period: 30s

  # ── Test runner (one-shot) ──────────────────────────────────────────────────
  test:
    build:
      context: .
      target: test-builder
    env_file: .env
    environment:
      POSTGRES_DB: pipeline_test
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/1
      PYTHONPATH: /app/src
    entrypoint: ["python", "-m", "pytest"]
    command: ["tests/", "-v", "--tb=short"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    restart: "no"
    profiles: ["test"]

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  minio_data:
